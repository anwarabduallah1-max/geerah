name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor with Android
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Jeerah com.jeerah.app --web-dir=dist || true
          npx cap add android || true
          npx cap sync android

      - name: Build Android APK (Debug)
        run: |
          cd android
          
          # استبعاد تكرار مكتبات كوتلن إجبارياً من الـ Gradle الرئيسي
          cat << 'EOF' > patch.gradle
          subprojects {
              project.configurations.all {
                  resolutionStrategy {
                      eachDependency { details ->
                          if (details.requested.group == 'org.jetbrains.kotlin') {
                              details.useVersion '1.8.22'
                          }
                      }
                  }
              }
          }
          EOF
          cat patch.gradle >> build.gradle
          
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jeerah-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
